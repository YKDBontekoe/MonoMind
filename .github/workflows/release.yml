name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            os_name: linux
            arch: x64
          - rid: win-x64
            runner: windows-latest
            os_name: windows
            arch: x64
          - rid: osx-arm64
            runner: macos-latest
            os_name: macos
            arch: arm64
          - rid: osx-x64
            runner: macos-13
            os_name: macos
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/Autonocraft
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained false
          --output publish/${{ matrix.rid }}

      - name: Run headless integration tests on published build
        shell: bash
        run: |
          BIN="publish/${{ matrix.rid }}/Autonocraft"
          if [ -f "publish/${{ matrix.rid }}/Autonocraft.exe" ]; then
            BIN="publish/${{ matrix.rid }}/Autonocraft.exe"
          fi
          "$BIN" --test

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd publish/${{ matrix.rid }}
          zip -r "../../Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip" .

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          files: Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: ${{ matrix.rid == 'linux-x64' }}
