name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: ${{ format('Publish ({0}, integration shard {1}/{2})', matrix.rid, matrix.shard_number, matrix.shard_count) }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            os_name: linux
            arch: x64
            shard_index: 0
            shard_number: 1
            shard_count: 4
          - rid: win-x64
            runner: windows-latest
            os_name: windows
            arch: x64
            shard_index: 1
            shard_number: 2
            shard_count: 4
          - rid: osx-arm64
            runner: macos-latest
            os_name: macos
            arch: arm64
            shard_index: 2
            shard_number: 3
            shard_count: 4
          - rid: osx-x64
            runner: macos-13
            os_name: macos
            arch: x64
            shard_index: 3
            shard_number: 4
            shard_count: 4
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/Autonocraft
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output publish/${{ matrix.rid }}

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          PACKAGE_ROOT="publish/${{ matrix.rid }}-app"
          APP_DIR="$PACKAGE_ROOT/Autonocraft.app"
          CONTENTS_DIR="$APP_DIR/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          mkdir -p "$MACOS_DIR"
          cp -R publish/${{ matrix.rid }}/. "$MACOS_DIR/"
          cp release/macos/Info.plist "$CONTENTS_DIR/Info.plist"
          chmod +x "$MACOS_DIR/Autonocraft"

      - name: Add Linux desktop launcher
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          cp release/linux/Autonocraft.desktop publish/${{ matrix.rid }}/Autonocraft.desktop
          chmod +x publish/${{ matrix.rid }}/Autonocraft.desktop

      - name: Run headless integration tests on published build
        shell: bash
        run: |
          BIN="publish/${{ matrix.rid }}/Autonocraft"
          if [ -f "publish/${{ matrix.rid }}/Autonocraft.exe" ]; then
            BIN="publish/${{ matrix.rid }}/Autonocraft.exe"
          fi
          export AUTONOCRAFT_TEST_SHARD_INDEX="${{ matrix.shard_index }}"
          export AUTONOCRAFT_TEST_SHARD_COUNT="${{ matrix.shard_count }}"
          "$BIN" --test

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cd publish/${{ matrix.rid }}-app
            zip -r "../../Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip" Autonocraft.app
          else
            cd publish/${{ matrix.rid }}
            zip -r "../../Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip" .
          fi

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip"

      - name: Extract changelog notes
        if: matrix.rid == 'linux-x64'
        id: notes
        shell: bash
        run: |
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          python3 scripts/release_bump.py extract "${{ steps.version.outputs.version }}" > "$NOTES_FILE"
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload release asset (with notes)
        if: matrix.rid == 'linux-x64'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Autonocraft ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip
          draft: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Upload release asset
        if: matrix.rid != 'linux-x64'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Autonocraft ${{ steps.version.outputs.version }}
          files: Autonocraft-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-${{ matrix.arch }}.zip
          draft: ${{ github.event_name == 'workflow_dispatch' }}
