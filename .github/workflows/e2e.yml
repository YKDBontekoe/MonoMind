name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  live-api-e2e:
    name: Live API E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libsdl2-2.0-0

      - name: Install Python dependencies
        run: pip install -r scripts/requirements-atlas.txt

      - name: Build game
        run: dotnet build src/Autonocraft --configuration Release

      - name: Run E2E suite (Unix)
        if: runner.os != 'Windows'
        env:
          USE_XVFB: ${{ runner.os == 'Linux' && '1' || '' }}
          PORT: '5001'
          CI: 'true'
          DYLD_LIBRARY_PATH: ''
        run: bash scripts/ci_e2e.sh

      - name: Run E2E suite (Windows)
        if: runner.os == 'Windows'
        env:
          PORT: '5001'
        shell: pwsh
        run: ./scripts/ci_e2e.ps1

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts-${{ matrix.os }}
          path: |
            test_output/game.log
            test_output/game.err.log
            test_output/live_api/
            test_output/scenarios/
