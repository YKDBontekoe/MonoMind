name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: dotnet format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify formatting
        run: dotnet format Autonocraft.slnx --verify-no-changes

  atlas-check:
    name: Atlas validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Validate atlas layout and generation
        run: dotnet run --project src/Autonocraft.AtlasBuild -- --check

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: core-a
            filter: "FullyQualifiedName~Autonocraft.Tests.Unit.AssemblyDependencyRulesTests|FullyQualifiedName~Autonocraft.Tests.Unit.ChunkLodTests|FullyQualifiedName~Autonocraft.Tests.Unit.CornerAoTests|FullyQualifiedName~Autonocraft.Tests.Unit.DayNightCycleTests|FullyQualifiedName~Autonocraft.Tests.Unit.SceneLightingTests"
          - group: core-b
            filter: "FullyQualifiedName~Autonocraft.Tests.Unit.CraftPatternMatcherTests|FullyQualifiedName~Autonocraft.Tests.Unit.CraftRecipeRegistryTests|FullyQualifiedName~Autonocraft.Tests.Unit.GridCraftingTests|FullyQualifiedName~Autonocraft.Tests.Unit.MiningCalculatorTests|FullyQualifiedName~Autonocraft.Tests.Unit.SigilRegistryTests"
          - group: world-a
            filter: "FullyQualifiedName~Autonocraft.Tests.Unit.AnimalPanicTests|FullyQualifiedName~Autonocraft.Tests.Unit.ClaimStructureFingerprintTests|FullyQualifiedName~Autonocraft.Tests.Unit.JungleFernPlacementTests|FullyQualifiedName~Autonocraft.Tests.Unit.ParticleSystemHighAltitudeTests"
          - group: world-b
            filter: "FullyQualifiedName~Autonocraft.Tests.Unit.SnowyPeaksFloraPlacementTests|FullyQualifiedName~Autonocraft.Tests.Unit.SwampLilyPadPlacementTests"
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build Autonocraft.slnx --configuration Release

      - name: Run tests with coverage
        run: >
          dotnet test tests/Autonocraft.Tests
          --configuration Release
          --no-build
          --filter "${{ matrix.filter }}"
          --collect:"XPlat Code Coverage"
          --results-directory coverage/${{ matrix.group }}/

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-${{ matrix.group }}
          path: coverage/${{ matrix.group }}/
