name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: dotnet format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify formatting
        run: dotnet format Autonocraft.slnx --verify-no-changes

  atlas-check:
    name: Atlas validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Validate atlas layout and generation
        run: dotnet run --project src/Autonocraft.AtlasBuild -- --check

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build Autonocraft.slnx --configuration Release

      - name: Run tests with coverage
        run: >
          dotnet test tests/Autonocraft.Tests
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~Autonocraft.Tests.Unit"
          --collect:"XPlat Code Coverage"
          --results-directory coverage/

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
