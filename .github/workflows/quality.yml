name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: dotnet format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify formatting
        run: dotnet format Autonocraft.slnx --verify-no-changes

  atlas-check:
    name: Atlas validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Validate atlas layout and generation
        run: dotnet run --project src/Autonocraft.AtlasBuild -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build Autonocraft.slnx --configuration Release

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-build-ubuntu-latest
          path: |
            src/**/bin/
            src/**/obj/
            tests/**/bin/
            tests/**/obj/
          if-no-files-found: error

  coverage:
    name: ${{ format('Code coverage (shard {0}/{1})', matrix.shard_number, matrix.shard_count) }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_number: 1
            shard_count: 4
          - shard_index: 1
            shard_number: 2
            shard_count: 4
          - shard_index: 2
            shard_number: 3
            shard_count: 4
          - shard_index: 3
            shard_number: 4
            shard_count: 4
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-ubuntu-latest

      - name: Run tests with coverage
        run: >
          python scripts/run_unit_test_shard.py
          --shard-index ${{ matrix.shard_index }}
          --shard-count ${{ matrix.shard_count }}
          --collect-coverage
          --results-directory coverage/shard-${{ matrix.shard_number }}-of-${{ matrix.shard_count }}/

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-shard-${{ matrix.shard_number }}-of-${{ matrix.shard_count }}
          path: coverage/shard-${{ matrix.shard_number }}-of-${{ matrix.shard_count }}/
