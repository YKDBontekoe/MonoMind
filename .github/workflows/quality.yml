name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: dotnet format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify formatting
        run: dotnet format Autonocraft.slnx --verify-no-changes

  atlas-check:
    name: Atlas validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Validate atlas layout and generation
        run: dotnet run --project src/Autonocraft.AtlasBuild -- --check

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build Autonocraft.slnx --configuration Release

      - name: Run tests with coverage
        run: >
          dotnet test tests/Autonocraft.Tests
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~Autonocraft.Tests.Unit"
          --collect:"XPlat Code Coverage"
          --results-directory coverage/

      - name: Generate coverage summary
        if: always()
        shell: bash
        run: |
          SUMMARY="coverage-summary.txt"
          {
            echo "Autonocraft unit test coverage summary"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
          } > "$SUMMARY"
          found=0
          while IFS= read -r file; do
            found=1
            line_rate=$(grep -o 'line-rate="[^"]*"' "$file" | head -1 | cut -d'"' -f2 || true)
            branch_rate=$(grep -o 'branch-rate="[^"]*"' "$file" | head -1 | cut -d'"' -f2 || true)
            lines_valid=$(grep -o 'lines-valid="[^"]*"' "$file" | head -1 | cut -d'"' -f2 || true)
            lines_covered=$(grep -o 'lines-covered="[^"]*"' "$file" | head -1 | cut -d'"' -f2 || true)
            echo "File: $file"
            echo "  line-rate: ${line_rate:-unknown}"
            echo "  branch-rate: ${branch_rate:-unknown}"
            echo "  lines-covered: ${lines_covered:-?} / ${lines_valid:-?}"
            echo ""
          done < <(find coverage -name 'coverage.cobertura.xml' 2>/dev/null | sort)
          if [[ "$found" -eq 0 ]]; then
            echo "No coverage.cobertura.xml files found under coverage/"
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            coverage-summary.txt
