name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  fast-gates:
    name: Fast gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: dotnet format
        run: dotnet format Autonocraft.slnx --verify-no-changes

      - name: Atlas validation
        run: dotnet run --project src/Autonocraft.AtlasBuild -- --check

  build:
    needs: fast-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: windows-latest
            platform: Windows
          - os: macos-latest
            platform: macOS
    name: ${{ format('Build ({0})', matrix.platform) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build Autonocraft.slnx --configuration Release

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-build-${{ matrix.os }}
          path: |
            src/**/bin/
            src/**/obj/
            tests/**/bin/
            tests/**/obj/
          if-no-files-found: error

  unit-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: windows-latest
            platform: Windows
          - os: macos-latest
            platform: macOS
    name: ${{ format('Unit tests ({0})', matrix.platform) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}

      - name: Run unit tests
        run: >
          dotnet test tests/Autonocraft.Tests
          --configuration Release
          --no-build
          --verbosity normal
          --filter "FullyQualifiedName~Autonocraft.Tests.Unit"
          --logger "trx;LogFileName=unit-results-${{ matrix.platform }}.trx"
          --results-directory TestResults

      - name: Publish unit test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: ${{ format('Unit tests ({0})', matrix.platform) }}
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results-${{ matrix.os }}
          path: TestResults/

  integration-tests:
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: windows-latest
            platform: Windows
          - os: macos-latest
            platform: macOS
    name: ${{ format('Integration tests ({0})', matrix.platform) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}

      - name: Run headless integration suite
        run: |
          dotnet exec src/Autonocraft/bin/Release/net10.0/Autonocraft.dll -- --test 2>&1 | Tee-Object -FilePath integration-output.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh
        if: runner.os == 'Windows'

      - name: Run headless integration suite
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          dotnet exec src/Autonocraft/bin/Release/net10.0/Autonocraft.dll -- --test 2>&1 | tee integration-output.log
          exit "${PIPESTATUS[0]}"

      - name: Upload integration log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-log-${{ matrix.os }}
          path: integration-output.log

  agent-e2e:
    name: Agent E2E (Linux)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-ubuntu-latest

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run agent E2E suite
        env:
          USE_XVFB: '1'
        run: bash scripts/ci_e2e.sh

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: agent-e2e-output
          path: test_output/
          if-no-files-found: ignore
