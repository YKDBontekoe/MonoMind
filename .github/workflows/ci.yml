name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: windows-latest
            platform: Windows
          - os: macos-latest
            platform: macOS
    name: ${{ format('Build ({0})', matrix.platform) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build solution
        run: dotnet build Autonocraft.slnx --configuration Release

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-build-${{ matrix.os }}
          path: |
            src/**/bin/
            src/**/obj/
            tests/**/bin/
            tests/**/obj/
          if-no-files-found: error

  unit-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            shard_index: 0
          - os: windows-latest
            platform: Windows
            shard_index: 1
          - os: macos-latest
            platform: macOS
            shard_index: 2
          - os: ubuntu-latest
            platform: Linux
            shard_index: 3
    name: ${{ format('Unit tests ({0}, shard {1})', matrix.platform, matrix.shard_index) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}

      - name: Run unit tests
        run: >
          python scripts/run_unit_test_shard.py
          --shard-index ${{ matrix.shard_index }}
          --shard-count 4
          --verbosity normal
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory TestResults/shard-${{ matrix.shard_index }}/

      - name: Publish unit test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: ${{ format('Unit tests ({0}, shard {1})', matrix.platform, matrix.shard_index) }}
          path: TestResults/shard-${{ matrix.shard_index }}/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results-${{ matrix.os }}-${{ matrix.shard_index }}
          path: TestResults/shard-${{ matrix.shard_index }}/

  integration-tests:
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            shard_index: 0
          - os: windows-latest
            platform: Windows
            shard_index: 1
          - os: macos-latest
            platform: macOS
            shard_index: 2
    name: ${{ format('Integration tests ({0}, shard {1})', matrix.platform, matrix.shard_index) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build-${{ matrix.os }}

      - name: Run headless integration suite
        run: |
          $env:AUTONOCRAFT_TEST_SHARD_INDEX = "${{ matrix.shard_index }}"
          $env:AUTONOCRAFT_TEST_SHARD_COUNT = "3"
          dotnet exec src/Autonocraft/bin/Release/net10.0/Autonocraft.dll -- --test 2>&1 | Tee-Object -FilePath integration-output.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh
        if: runner.os == 'Windows'

      - name: Run headless integration suite
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          export AUTONOCRAFT_TEST_SHARD_INDEX="${{ matrix.shard_index }}"
          export AUTONOCRAFT_TEST_SHARD_COUNT="3"
          dotnet exec src/Autonocraft/bin/Release/net10.0/Autonocraft.dll -- --test 2>&1 | tee integration-output.log
          exit "${PIPESTATUS[0]}"

      - name: Upload integration log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-log-${{ matrix.os }}
          path: integration-output.log
