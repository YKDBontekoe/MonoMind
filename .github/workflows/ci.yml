name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/Autonocraft --configuration Release

      - name: Build tests
        run: dotnet build tests/Autonocraft.Tests --configuration Release

      - name: Run unit and integration tests
        run: dotnet test tests/Autonocraft.Tests --configuration Release --no-build --verbosity normal
