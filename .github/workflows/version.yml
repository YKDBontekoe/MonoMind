name: Version and Changelog

on:
  workflow_run:
    workflows: [CI, Quality, CodeQL]
    types: [completed]
    branches: [main, master]

permissions:
  contents: write
  actions: read

concurrency:
  group: version-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  bump-and-tag:
    name: Bump version and tag
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI, Quality, and CodeQL all succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const required = ['ci.yml', 'quality.yml', 'codeql.yml'];
            for (const workflowFile of required) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                head_sha: sha,
                status: 'completed',
                per_page: 10
              });
              const success = data.workflow_runs.some(run => run.conclusion === 'success');
              if (!success) {
                core.setFailed(`Required workflow ${workflowFile} did not succeed for ${sha}`);
                return;
              }
            }
            core.info(`All required workflows succeeded for ${sha}`);

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.1.7
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Sync to latest branch tip
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          git fetch origin "${BRANCH}"
          git checkout "origin/${BRANCH}"

      - name: Check for releasable commits
        id: check
        run: |
          if python3 scripts/release_bump.py check; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and changelog
        if: steps.check.outputs.needed == 'true'
        id: bump
        run: |
          NEW_VERSION="$(python3 scripts/release_bump.py bump)"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping to v$NEW_VERSION"

      - name: Commit release metadata
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"

      - name: Push version commit and tag
        if: steps.check.outputs.needed == 'true'
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          VERSION="${{ steps.bump.outputs.version }}"

          git fetch origin "${BRANCH}"
          git rebase "origin/${BRANCH}"
          git push origin "HEAD:${BRANCH}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
