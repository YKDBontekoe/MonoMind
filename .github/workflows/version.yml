name: Version and Changelog

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  bump-and-tag:
    name: Bump version and tag
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for releasable commits
        id: check
        run: |
          if python3 scripts/release_bump.py check; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and changelog
        if: steps.check.outputs.needed == 'true'
        id: bump
        run: |
          NEW_VERSION="$(python3 scripts/release_bump.py bump)"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping to v$NEW_VERSION"

      - name: Commit release metadata on branch
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="chore/release-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add VERSION CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"

      - name: Push release branch, tag, and open PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="chore/release-v${VERSION}"
          BASE="${{ github.event.workflow_run.head_branch }}"

          git push origin "HEAD:${BRANCH}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr create \
              --base "$BASE" \
              --head "$BRANCH" \
              --title "chore(release): v${VERSION}" \
              --body "Automated version bump and changelog update."
          fi

      - name: Merge release PR
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="chore/release-v${VERSION}"

          PR_NUM="$(gh pr view "$BRANCH" --json number -q .number)"
          gh pr checks "$PR_NUM" --watch --interval 15 --fail-fast
          gh pr merge "$PR_NUM" --merge --delete-branch
